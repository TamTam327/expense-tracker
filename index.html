<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Expense Tracker</h1>
            <p>Track your spending and manage your budget</p>
        </header>

        <div class="main-content">
            <!-- Add Expense Form -->
            <div class="add-expense-section">
                <h2>Add New Expense</h2>
                <form id="expenseForm">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input 
                            type="text" 
                            id="description" 
                            placeholder="e.g., Grocery shopping"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="amount">Amount</label>
                        <input 
                            type="number" 
                            id="amount" 
                            placeholder="0.00"
                            step="0.01"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Bills">Bills</option>
                            <option value="Health">Health</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="date">Date</label>
                        <input 
                            type="date" 
                            id="date"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-add">Add Expense</button>
                </form>
            </div>

            <!-- Summary Section -->
            <div class="summary-section">
                <div class="summary-card total">
                    <h3>Total Expenses</h3>
                    <p id="totalExpenses">$0.00</p>
                </div>
                <div class="summary-card income">
                    <h3>This Month</h3>
                    <p id="monthExpenses">$0.00</p>
                </div>
                <div class="summary-card budget">
                    <h3>Budget Left</h3>
                    <p id="budgetLeft">$0.00</p>
                </div>
            </div>

            <!-- Filter Section -->
            <div class="filter-section">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search expenses..."
                    class="search-input"
                >
                <select id="filterCategory" class="filter-select">
                    <option value="">All Categories</option>
                    <option value="Food">Food</option>
                    <option value="Transport">Transport</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Bills">Bills</option>
                    <option value="Health">Health</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <!-- Expenses List -->
            <div class="expenses-section">
                <h2>Recent Expenses</h2>
                <div id="expensesList" class="expenses-list"></div>
                <div id="emptyState" class="empty-state">
                    <p>No expenses yet. Add one to get started! 📊</p>
                </div>
            </div>

            <!-- Delete All Button -->
            <button id="deleteAllBtn" class="btn-delete-all">Clear All Expenses</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
